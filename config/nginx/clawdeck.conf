# Bootstrap nginx template rendered by script/install_services.sh.
# certbot --nginx rewrites this file in-place to add the TLS server block.
upstream puma {
  server 127.0.0.1:__APP_PORT__ fail_timeout=0;
}

server {
  listen 80;
  listen [::]:80;
  server_name __SERVER_NAMES__;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location /up {
    proxy_pass http://puma;
    proxy_set_header Host $host;
    access_log off;
  }

  location / {
    proxy_pass http://puma;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  root __APP_ROOT__/public;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  client_max_body_size 10M;
  keepalive_timeout 10;
}
