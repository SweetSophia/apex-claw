services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: clawdeck_production
      POSTGRES_USER: clawdeck
      POSTGRES_PASSWORD: ${APEX_CLAW_DB_PASSWORD:-${CLAWDECK_DB_PASSWORD:-clawdeck_prod_2026}}
    # No host port mapping — DB stays internal to Docker network
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawdeck"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      bash -c "
        rm -f tmp/pids/server.pid &&
        bin/rails db:create db:migrate &&
        bin/rails assets:precompile &&
        bin/rails server -b 0.0.0.0 -p 3000 -e production
      "
    ports:
      - "127.0.0.1:3000:3000"
      - "100.111.85.48:3000:3000"
    env_file:
      - .env.production
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://clawdeck:${APEX_CLAW_DB_PASSWORD:-${CLAWDECK_DB_PASSWORD:-clawdeck_prod_2026}}@db:5432/clawdeck_production}
      RAILS_ENV: production
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      RAILS_SERVE_STATIC_FILES: "true"
      RAILS_LOG_LEVEL: ${RAILS_LOG_LEVEL:-info}
      GOOD_JOB_EXECUTION_MODE: async
      APP_HOST: ${APP_HOST:-100.111.85.48:3000}
      APP_PROTOCOL: ${APP_PROTOCOL:-http}
      APP_FORCE_SSL: ${APP_FORCE_SSL:-false}
      APP_ALLOWED_HOSTS: ${APP_ALLOWED_HOSTS:-100.111.85.48,127.0.0.1,::1}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_prod_data:
