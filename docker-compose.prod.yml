services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: clawdeck_production
      POSTGRES_USER: clawdeck
      POSTGRES_PASSWORD: ${CLAWDECK_DB_PASSWORD:-clawdeck_prod_2026}
    # No host port mapping — DB stays internal to Docker network
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawdeck"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      bash -c "
        rm -f tmp/pids/server.pid &&
        bin/rails db:create db:migrate &&
        bin/rails server -b 0.0.0.0 -p 3000 -e production
      "
    ports:
      - "127.0.0.1:3000:3000"
      - "100.111.85.48:3000:3000"
    environment:
      DATABASE_URL: postgres://clawdeck:${CLAWDECK_DB_PASSWORD:-clawdeck_prod_2026}@db:5432/clawdeck_production
      RAILS_ENV: production
      SECRET_KEY_BASE: ${CLAWDECK_SECRET_KEY_BASE}
      RAILS_SERVE_STATIC_FILES: "true"
      RAILS_LOG_LEVEL: info
      GOOD_JOB_EXECUTION_MODE: async
      APP_HOST: clawdeck.local
      APP_ALLOWED_HOSTS: "clawdeck.local,100.111.85.48,127.0.0.1,::1"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_prod_data:
