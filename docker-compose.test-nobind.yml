services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: clawdeck_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    command: bash -lc "bundle install && bin/rails db:prepare && bin/rails test test/helpers/application_helper_test.rb test/controllers/home_controller_test.rb test/controllers/pages_controller_test.rb"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/clawdeck_test
      RAILS_ENV: test
      SECRET_KEY_BASE: test_secret_key_base_for_docker
      NODE_ENV: test
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_test_data:
  bundle_cache_test:
